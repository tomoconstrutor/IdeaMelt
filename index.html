<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta
      name="description"
      content="Idea Melt sends real and crazy ideas before everyone else."
    >
    <title>Idea Melt | Real and Crazy Ideas</title>
    <link rel="stylesheet" href="styles.css">
    <script src="app.config.js"></script>
    <script src="app.js" defer></script>
  </head>
  <body>
    <a class="skip-link" href="#main">Skip to content</a>

    <div class="page-noise" aria-hidden="true"></div>

    <main id="main" class="poster-frame">
      <header class="site-header ruled-block">
        <div class="brand-mark">
          <span class="tiny-note">put the thesis<br>before the trend</span>
          <a href="#main" aria-label="Idea Melt home">Idea<br>Melt</a>
        </div>

        <div class="header-note" aria-hidden="true">
          <span>daily issue</span>
          <span>strange signal / useful angle</span>
        </div>
      </header>

      <section class="subscribe-hero ruled-block" aria-labelledby="subscribe-title">
        <div class="hero-kicker">
          <span>(01) private signal</span>
          <span>before obvious</span>
        </div>

        <div class="subscribe-copy">
          <span class="hero-label">(subscribe)</span>
          <h1 id="subscribe-title">Subscribe for crazy ideas before everyone else.</h1>

          <form class="signup-form" data-signup-form data-source-form="github-pages" novalidate>
            <label for="email">Email</label>
            <div class="signup-row">
              <input id="email" name="email" type="email" placeholder="type your email here" autocomplete="email" required>
              <input class="hp-field" name="_gotcha" type="text" tabindex="-1" autocomplete="off" aria-hidden="true">
              <button type="submit">Subscribe</button>
            </div>
            <p class="form-message" data-form-message role="status" aria-live="polite">No spam. Only the good strange stuff.</p>
          </form>
        </div>
      </section>

      <footer class="site-footer ruled-block">
        <p>Idea Melt / real and crazy ideas for curious builders</p>
        <a href="#main" aria-label="Back to top">(←)</a>
      </footer>
    </main>
  </body>
</html>
